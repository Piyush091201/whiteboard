name: CI

on:
  push:
    branches: [main]
  pull_request:

# The whole point of this project is provable concurrency correctness, so the
# race detector runs on every push and PR. A red race detector fails the build.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        # v8 installs golangci-lint v2 (matching the version: "2" config) built
        # with a recent Go, so it can lint a go 1.26 module. v6 shipped v1.
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
